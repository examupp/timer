<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemasa Peperiksaan</title>
<style>
  :root{
    --navy-deep:#050A1E;
    --navy-mid:#0E1738;
    --navy-card:#16214A;
    --yellow:#FFCC4D;
    --white:#FAFBFF;
    --muted:#8994BF;
    --green:#3EE08C;
    --amber:#FFB020;
    --red:#FF5266;
    --border:rgba(255,255,255,0.10);
  }
  html,body{height:100%;}
  *{box-sizing:border-box;}
  body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% -10%, rgba(255,201,52,0.08), transparent 40%),
      radial-gradient(circle at 90% 110%, rgba(62,213,152,0.06), transparent 45%),
      linear-gradient(180deg, var(--navy-deep) 0%, var(--navy-mid) 100%);
    color:var(--white);
    font-family:'Segoe UI', Roboto, -apple-system, Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 24px;
    box-sizing:border-box;
  }

  /* Top clock ribbon */
  .clock-ribbon{
    width:100%;
    max-width:none;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:16px 22px;
    border:1px solid var(--border);
    border-radius:14px;
    background:linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    margin-bottom:18px;
    gap:14px;
    flex-shrink:0;
  }
  .clock-ribbon .clock-center{
    text-align:center;
  }
  .clock-ribbon .ribbon-spacer{
    min-width:1px;
  }
  @media (max-width:700px){
    .clock-ribbon{grid-template-columns:1fr; text-align:center;}
    .clock-ribbon .ribbon-spacer{display:none;}
    .clock-ribbon .top-actions{justify-self:center;}
  }
  .clock-ribbon .date{
    font-size:clamp(15px,1.6vw,20px);
    color:var(--muted);
    letter-spacing:1px;
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:4px;
  }
  .clock-ribbon .time{
    font-size:clamp(48px,7vw,88px);
    font-weight:900;
    letter-spacing:3px;
    font-variant-numeric: tabular-nums;
    line-height:1;
  }
  .clock-ribbon .time .period{
    font-size:0.35em;
    font-weight:700;
    letter-spacing:2px;
    margin-left:8px;
    vertical-align:middle;
    opacity:0.85;
  }
  .top-actions{
    display:flex;
    gap:10px;
    justify-self:end;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s;
  }
  .clock-ribbon:hover .top-actions,
  .clock-ribbon:focus-within .top-actions,
  .clock-ribbon.actions-visible .top-actions{
    opacity:1;
    pointer-events:auto;
  }
  .icon-btn{
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    color:var(--white);
    padding:9px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:6px;
    transition:.15s;
  }
  .icon-btn:hover{background:rgba(255,255,255,0.12);}
  .icon-btn.icon-only{
    padding:9px;
    width:38px;
    height:38px;
    justify-content:center;
  }
  .icon-btn.icon-only svg{display:block;}

  /* Session grid */
  .grid{
    width:100%;
    max-width:none;
    flex:1 1 auto;
    min-height:0;
    display:grid;
    grid-auto-rows:1fr;
    gap:20px;
  }

  .card{
    position:relative;
    background:linear-gradient(180deg, var(--navy-card), rgba(20,31,71,0.5));
    border:1px solid var(--border);
    border-radius:18px;
    padding:4% 5%;
    text-align:center;
    overflow:hidden;
    transition:box-shadow .3s, border-color .3s;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2%;
    container-type:size;
    container-name:examcard;
    box-sizing:border-box;
  }
  .card::before{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:4px;
    background:var(--green);
    transition:background .3s;
  }
  .card.state-amber::before{background:var(--amber);}
  .card.state-red::before{background:var(--red);}
  .card.state-done::before{background:var(--muted);}

  .card .code{
    font-size:clamp(20px, min(28cqh, 20cqw), 320px);
    font-weight:900;
    color:var(--yellow);
    letter-spacing:1px;
    margin:0 0 2%;
    line-height:1.1;
  }
  .card .session{
    font-size:clamp(11px, min(10cqh, 7.5cqw), 110px);
    font-weight:700;
    color:var(--yellow);
    opacity:.85;
    text-transform:uppercase;
    letter-spacing:2px;
    margin:0 0 3%;
    line-height:1.2;
  }
  .card .range{
    font-size:clamp(13px, min(12cqh, 9.5cqw), 130px);
    color:var(--white);
    font-weight:600;
    margin:0 0 5%;
    line-height:1.2;
  }
  .card .status-label{
    font-size:clamp(10px, min(6cqh, 5cqw), 70px);
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 2%;
  }
  .card .countdown{
    font-size:clamp(24px, min(32cqh, 24cqw), 340px);
    font-weight:900;
    font-variant-numeric: tabular-nums;
    letter-spacing:1px;
    color:var(--green);
    transition:color .3s;
    line-height:1.1;
  }
  .card.state-amber .countdown{color:var(--amber);}
  .card.state-red .countdown{
    color:var(--red);
    animation:pulseRed 1s infinite;
  }
  .card.state-red{
    animation:glowRed 1s infinite;
  }
  .card.state-done .countdown{color:var(--muted); font-size:clamp(20px, min(20cqh, 16cqw), 200px);}
  .card .countdown.running-text{
    color:var(--green);
    font-size:clamp(14px, min(14cqh, 11cqw), 140px);
    font-weight:800;
    letter-spacing:2px;
    opacity:.85;
  }

  @keyframes pulseRed{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:.75; transform:scale(1.04);}
  }
  @keyframes glowRed{
    0%,100%{box-shadow:0 0 0px rgba(255,71,87,0);}
    50%{box-shadow:0 0 40px rgba(255,71,87,0.35);}
  }

  .card .card-actions{
    position:absolute;
    top:12px; right:12px;
    display:flex;
    gap:8px;
    opacity:0;
    transition:opacity .15s;
  }
  .card:hover .card-actions{opacity:1;}
  .card .card-actions button{
    background:none;
    border:none;
    color:var(--muted);
    font-size:16px;
    cursor:pointer;
  }
  .card .card-actions .edit-btn:hover{color:var(--yellow);}
  .card .card-actions .remove-btn:hover{color:var(--red);}

  .empty-state{
    text-align:center;
    color:var(--muted);
    padding:20px;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    grid-column:1/-1;
    grid-row:1/-1;
  }

  /* Edit panel — fixed overlay so it never disturbs the full-screen auto-fit layout */
  .edit-panel{
    position:fixed;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    width:calc(100% - 48px);
    max-width:1200px;
    max-height:calc(100vh - 40px);
    overflow-y:auto;
    border:1px solid var(--border);
    border-radius:16px;
    padding:22px;
    background:rgba(10,14,34,0.97);
    backdrop-filter:blur(8px);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    z-index:100;
  }
  .edit-panel h3{
    margin:0 0 16px;
    font-size:16px;
    color:var(--yellow);
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .form-row{
    display:grid;
    grid-template-columns:1fr 1fr 1.3fr 1fr 1fr 1fr auto;
    gap:12px;
    margin-bottom:12px;
    align-items:end;
  }
  @media (max-width:900px){
    .form-row{grid-template-columns:1fr 1fr;}
  }
  .field{display:flex; flex-direction:column; gap:6px;}
  .field label{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}
  .field input, .field select{
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    color:var(--white);
    font-size:14px;
    outline:none;
  }
  .field input:focus, .field select:focus{border-color:var(--yellow);}
  .field select{
    cursor:pointer;
  }
  .field select option{
    background:var(--navy-card);
    color:var(--white);
  }
  .add-btn{
    background:var(--yellow);
    color:#1a1400;
    border:none;
    border-radius:10px;
    padding:11px 20px;
    font-weight:800;
    cursor:pointer;
    font-size:14px;
    white-space:nowrap;
  }
  .add-btn:hover{filter:brightness(1.08);}

  .threshold-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:14px;
    font-size:13px;
    color:var(--muted);
  }
  .threshold-row input{
    width:70px;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--border);
    border-radius:8px;
    padding:7px 10px;
    color:var(--white);
    font-size:14px;
  }

  .hidden{display:none !important;}

  /* Class tabs */
  .class-tabs{
    width:100%;
    max-width:none;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:16px;
    flex-shrink:0;
  }
  .class-tab{
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    color:var(--muted);
    padding:10px 20px;
    border-radius:999px;
    cursor:pointer;
    font-size:14px;
    font-weight:700;
    letter-spacing:.5px;
    transition:.15s;
  }
  .class-tab:hover{background:rgba(255,255,255,0.1); color:var(--white);}
  .class-tab.active{
    background:var(--yellow);
    color:#1a1400;
    border-color:var(--yellow);
  }


</style>
</head>
<body>

  <div class="clock-ribbon" id="clockRibbon">
    <div class="ribbon-spacer"></div>
    <div class="clock-center">
      <div class="date" id="dateLabel">--</div>
      <div class="time" id="timeLabel">--:--:--</div>
    </div>
    <div class="top-actions">
      <button class="icon-btn icon-only" id="tabsToggleBtn" title="Tunjuk/Sembunyi Tab Kelas"></button>
      <button class="icon-btn edit-toggle" id="editToggleBtn">⚙ Urus Sesi</button>
    </div>
  </div>

  <div class="class-tabs" id="dewanTabs"></div>
  <div class="class-tabs" id="classTabs"></div>

  <div class="grid" id="grid">
    <div class="empty-state" id="emptyState">Belum ada sesi peperiksaan ditambah.<br>Klik "Urus Sesi" untuk tambah kertas peperiksaan.</div>
  </div>

  <div class="edit-panel hidden" id="editPanel">
    <h3 id="formHeading">Tambah Sesi Peperiksaan</h3>
    <div class="form-row">
      <div class="field">
        <label>Dewan</label>
        <select id="inDewan">
          <option value="">-- Pilih Dewan --</option>
          <option value="DEWAN BESAR">DEWAN BESAR</option>
        </select>
      </div>
      <div class="field">
        <label>Kelas</label>
        <select id="inKelas">
          <option value="">-- Pilih Kelas --</option>
          <option value="EC-G-1">EC-G-1</option>
          <option value="EC-G-2">EC-G-2</option>
          <option value="EC-G-3">EC-G-3</option>
          <option value="EC-G-4">EC-G-4</option>
          <option value="EC-G-5">EC-G-5</option>
        </select>
      </div>
      <div class="field">
        <label>Kod Kursus</label>
        <input type="text" id="inCode" placeholder="cth: MPU 2372">
      </div>
      <div class="field">
        <label>Label Sesi</label>
        <input type="text" id="inSession" placeholder="cth: ITTAM">
      </div>
      <div class="field">
        <label>Masa Mula</label>
        <input type="time" id="inStart">
      </div>
      <div class="field">
        <label>Masa Tamat</label>
        <input type="time" id="inEnd">
      </div>
      <button class="add-btn" id="addBtn">+ Tambah</button>
      <button class="icon-btn hidden" id="cancelEditBtn">Batal</button>
    </div>
    <div class="threshold-row">
      Amaran mula bila baki
      <input type="number" id="thresholdInput" min="1" max="120" value="15">
      minit
      <span style="color:var(--red); margin-left:6px;">(kad akan bertukar merah &amp; berdenyut)</span>
      <button class="icon-btn" id="resetAllBtn" style="margin-left:auto; color:var(--red); border-color:rgba(255,71,87,0.3);">🗑 Reset Semua Sesi &amp; Amaran</button>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCf9lwVlXXTbijUpjR9bpxyDX94_fqEKnQ",
  authDomain: "timer-exam.firebaseapp.com",
  databaseURL: "https://timer-exam-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "timer-exam",
  storageBucket: "timer-exam.firebasestorage.app",
  messagingSenderId: "360308589393",
  appId: "1:360308589393:web:b6fa620e1e3b5e05edc970"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const sessionsRef = ref(db, 'sessions');

const THRESHOLD_KEY = 'examTimerThreshold_v1';
const SESSIONS_CACHE_KEY = 'examTimerSessionsCache_v1'; // cache offline sahaja, bukan sumber utama

// Baca param dewan (db) & kelas (ec) dari URL, cth: ?db=DK1&ec=A
const urlParams = new URLSearchParams(window.location.search);
const lockedDewan = urlParams.get('db');   // null kalau takde dalam URL
const lockedKelas = urlParams.get('ec');   // null kalau takde dalam URL

// sessions sekarang objek {pushKey: {dewan,kelas,code,session,start,end}}, bukan array
// mula-mula guna cache localStorage (offline/render awal), Firebase akan overwrite bila data sampai
let sessions = JSON.parse(localStorage.getItem(SESSIONS_CACHE_KEY) || '{}');
let warnThreshold = parseInt(localStorage.getItem(THRESHOLD_KEY) || '15', 10);
// selectedClasses: array kosong = "Semua". Boleh ada >1 kelas serentak.
let selectedClasses = lockedKelas
  ? lockedKelas.split(',').map(s=>s.trim()).filter(Boolean)
  : JSON.parse(localStorage.getItem('examTimerSelectedClasses_v1') || '[]');
let selectedDewans = lockedDewan
  ? [lockedDewan]
  : JSON.parse(localStorage.getItem('examTimerSelectedDewans_v1') || '[]');
let editingKey = null;
let tabsHidden = localStorage.getItem('examTimerTabsHidden_v1') === 'true';

const EYE_OPEN_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_SLASH_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function applyTabsVisibility(){
  const btn = document.getElementById('tabsToggleBtn');
  classTabs.classList.toggle('hidden', tabsHidden);
  dewanTabs.classList.toggle('hidden', tabsHidden);
  btn.innerHTML = tabsHidden ? EYE_SLASH_SVG : EYE_OPEN_SVG;
  btn.title = tabsHidden ? 'Tunjuk Tab Dewan/Kelas' : 'Sembunyi Tab Dewan/Kelas';
  requestAnimationFrame(layoutGrid);
}

const grid = document.getElementById('grid');
const emptyState = document.getElementById('emptyState');
const editPanel = document.getElementById('editPanel');
const editToggleBtn = document.getElementById('editToggleBtn');
const thresholdInput = document.getElementById('thresholdInput');
const classTabs = document.getElementById('classTabs');
const dewanTabs = document.getElementById('dewanTabs');
thresholdInput.value = warnThreshold;

// Fon/touchscreen takde konsep hover, jadi butang (mata/Urus Sesi) tak akan
// keluar kalau bergantung pada :hover je. Tap kat ribuan jam untuk toggle.
const clockRibbon = document.getElementById('clockRibbon');
clockRibbon.addEventListener('click', (e)=>{
  // kalau tap tepat kat butang, biar butang tu jalan macam biasa (jangan toggle balik)
  if(e.target.closest('.icon-btn')) return;
  clockRibbon.classList.toggle('actions-visible');
});
// tap di luar ribbon akan tutup balik butang tu
document.addEventListener('click', (e)=>{
  if(!clockRibbon.contains(e.target)){
    clockRibbon.classList.remove('actions-visible');
  }
});

function cacheSessionsLocally(){
  localStorage.setItem(SESSIONS_CACHE_KEY, JSON.stringify(sessions));
}

// Dengar perubahan live dari Firebase — bila mana-mana peranti tambah/edit/padam,
// SEMUA skrin yang buka (fon/desktop/dewan lain) terus update automatik.
onValue(sessionsRef, (snapshot)=>{
  sessions = snapshot.val() || {};
  cacheSessionsLocally();
  render();
}, (err)=>{
  console.error('Firebase sync error:', err);
});

function renderDewanTabs(){
  if(lockedDewan){ dewanTabs.innerHTML = ''; return; } // dikunci via URL ?db=, tak perlu tab
  const dewans = [...new Set(Object.values(sessions).map(s => s.dewan).filter(Boolean))];
  selectedDewans = selectedDewans.filter(d => dewans.includes(d));
  dewanTabs.innerHTML = '';
  if(dewans.length === 0) return; // takde dewan lagi

  const allBtn = document.createElement('button');
  allBtn.className = 'class-tab' + (selectedDewans.length===0 ? ' active' : '');
  allBtn.textContent = 'Semua Dewan';
  allBtn.addEventListener('click', ()=>{
    selectedDewans = [];
    localStorage.setItem('examTimerSelectedDewans_v1', JSON.stringify(selectedDewans));
    renderDewanTabs();
    render();
  });
  dewanTabs.appendChild(allBtn);

  dewans.forEach(d=>{
    const btn = document.createElement('button');
    btn.className = 'class-tab' + (selectedDewans.includes(d) ? ' active' : '');
    btn.textContent = d;
    btn.addEventListener('click', ()=>{
      if(selectedDewans.includes(d)){
        selectedDewans = selectedDewans.filter(x => x !== d);
      } else {
        selectedDewans = [...selectedDewans, d];
      }
      localStorage.setItem('examTimerSelectedDewans_v1', JSON.stringify(selectedDewans));
      renderDewanTabs();
      render();
    });
    dewanTabs.appendChild(btn);
  });
}

function renderClassTabs(){
  if(lockedKelas){ classTabs.innerHTML = ''; return; } // dikunci via URL ?ec=, tak perlu tab
  const classes = [...new Set(Object.values(sessions).map(s => s.kelas).filter(Boolean))];
  // buang kelas yang dah takde dari selection (kalau session dah dipadam)
  selectedClasses = selectedClasses.filter(c => classes.includes(c));
  classTabs.innerHTML = '';
  if(classes.length === 0) return; // takde kelas lagi

  // Butang "Semua"
  const allBtn = document.createElement('button');
  allBtn.className = 'class-tab' + (selectedClasses.length===0 ? ' active' : '');
  allBtn.textContent = 'Semua';
  allBtn.addEventListener('click', ()=>{
    selectedClasses = [];
    localStorage.setItem('examTimerSelectedClasses_v1', JSON.stringify(selectedClasses));
    renderClassTabs();
    render();
  });
  classTabs.appendChild(allBtn);

  // Butang tiap kelas — klik untuk toggle masuk/keluar dari selection
  classes.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'class-tab' + (selectedClasses.includes(c) ? ' active' : '');
    btn.textContent = c;
    btn.addEventListener('click', ()=>{
      if(selectedClasses.includes(c)){
        selectedClasses = selectedClasses.filter(x => x !== c);
      } else {
        selectedClasses = [...selectedClasses, c];
      }
      localStorage.setItem('examTimerSelectedClasses_v1', JSON.stringify(selectedClasses));
      renderClassTabs();
      render();
    });
    classTabs.appendChild(btn);
  });
}

function pad(n){ return n.toString().padStart(2,'0'); }

function todayAt(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d;
}

function fmtRange(start, end){
  function to12(hhmm){
    const [h,m] = hhmm.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    let h12 = h % 12; if(h12===0) h12=12;
    return `${h12}.${pad(m)} ${period}`;
  }
  return `(${to12(start)} - ${to12(end)})`;
}

function render(){
  renderDewanTabs();
  renderClassTabs();
  grid.querySelectorAll('.card').forEach(c=>c.remove());

  const allSessions = Object.entries(sessions).map(([key, s]) => ({...s, _key: key}));
  const hasAny = allSessions.length > 0;

  const visibleSessions = allSessions
    .filter(s => !lockedDewan || (s.dewan || '').toLowerCase() === lockedDewan.toLowerCase())
    .filter(s => selectedDewans.length === 0 || selectedDewans.includes(s.dewan))
    .filter(s => selectedClasses.length === 0 || selectedClasses.includes(s.kelas));

  emptyState.classList.toggle('hidden', visibleSessions.length>0);
  if(visibleSessions.length===0 && hasAny){
    const filters = [...selectedDewans, ...selectedClasses];
    emptyState.textContent = filters.length===0
      ? 'Tiada sesi untuk paparan ini.'
      : `Tiada sesi untuk "${filters.join(', ')}".`;
    emptyState.classList.remove('hidden');
  } else if(!hasAny){
    emptyState.textContent = 'Belum ada sesi peperiksaan ditambah. Klik "Urus Sesi" untuk tambah kertas peperiksaan.';
  }

  visibleSessions.forEach(s=>{
    const key = s._key;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.key = key;
    card.innerHTML = `
      <div class="card-actions">
        <button class="edit-btn" title="Edit">✎</button>
        <button class="remove-btn" title="Buang">✕</button>
      </div>
      <div class="code">${escapeHtml(s.code)}</div>
      ${s.session ? `<div class="session">${escapeHtml(s.session)}</div>` : ''}
      <div class="range">${fmtRange(s.start, s.end)}</div>
      <div class="status-label">Baki Masa</div>
      <div class="countdown">--:--</div>
    `;
    card.querySelector('.edit-btn').addEventListener('click', ()=>{
      startEdit(key);
    });
    card.querySelector('.remove-btn').addEventListener('click', ()=>{
      remove(ref(db, 'sessions/' + key));
      if(editingKey === key) cancelEdit();
    });
    grid.appendChild(card);
  });

  layoutGrid();
}

function layoutGrid(){
  const n = grid.querySelectorAll('.card').length;
  if(n === 0){ grid.style.gridTemplateColumns = '1fr'; return; }

  const rect = grid.getBoundingClientRect();
  const w = rect.width || window.innerWidth;
  const h = rect.height || (window.innerHeight * 0.6);

  let bestCols = 1, bestScore = -Infinity;
  for(let cols = 1; cols <= n; cols++){
    const rows = Math.ceil(n / cols);
    const cellW = w / cols;
    const cellH = h / rows;
    const score = Math.min(cellW, cellH); // maximize the smaller dimension = biggest readable card
    if(score > bestScore){
      bestScore = score;
      bestCols = cols;
    }
  }
  grid.style.gridTemplateColumns = `repeat(${bestCols}, 1fr)`;
}

window.addEventListener('resize', ()=> requestAnimationFrame(layoutGrid));

function tick(){
  const now = new Date();
  let h24 = now.getHours();
  let h12 = h24 % 12; if(h12 === 0) h12 = 12;
  document.getElementById('timeLabel').textContent =
    `${pad(h12)}:${pad(now.getMinutes())}`;
  document.getElementById('dateLabel').textContent =
    now.toLocaleDateString('ms-MY', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  const cards = grid.querySelectorAll('.card');
  const initialCount = cards.length;
  cards.forEach(card=>{
    const key = card.dataset.key;
    const s = sessions[key];
    if(!s) return;
    const start = todayAt(s.start);
    const end = todayAt(s.end);
    const autoHideAt = new Date(end.getTime() + 5*60000);

    if(now >= autoHideAt){
      card.remove();
      return;
    }

    const countdownEl = card.querySelector('.countdown');
    const statusEl = card.querySelector('.status-label');

    card.classList.remove('state-amber','state-red','state-done');
    countdownEl.classList.remove('running-text');

    if(now < start){
      const diff = Math.max(0, start - now);
      statusEl.textContent = 'Bermula Dalam';
      countdownEl.textContent = fmtDuration(diff);
    } else if(now >= end){
      statusEl.textContent = 'Status';
      countdownEl.textContent = 'MASA TAMAT';
      card.classList.add('state-done');
    } else {
      const diff = end - now;
      const minsLeft = diff / 60000;
      if(minsLeft <= warnThreshold){
        statusEl.textContent = 'Baki Masa';
        countdownEl.textContent = fmtDuration(diff);
        card.classList.add('state-red');
      } else {
        statusEl.textContent = '';
        countdownEl.textContent = '';
      }
    }
  });

  if(initialCount > 0 && grid.querySelectorAll('.card').length === 0){
    emptyState.textContent = 'Tiada kertas aktif buat masa ini.';
    emptyState.classList.remove('hidden');
  }
  if(grid.querySelectorAll('.card').length !== initialCount){
    layoutGrid();
  }
}

function fmtDuration(ms){
  let totalSec = Math.max(0, Math.floor(ms/1000));
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const sec = totalSec%60;
  if(h>0) return `${pad(h)}:${pad(m)}:${pad(sec)}`;
  return `${pad(m)}:${pad(sec)}`;
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function startEdit(key){
  const s = sessions[key];
  editingKey = key;
  document.getElementById('inDewan').value = s.dewan || '';
  document.getElementById('inKelas').value = s.kelas || '';
  document.getElementById('inCode').value = s.code || '';
  document.getElementById('inSession').value = s.session || '';
  document.getElementById('inStart').value = s.start || '';
  document.getElementById('inEnd').value = s.end || '';
  document.getElementById('formHeading').textContent = 'Kemas Kini Sesi';
  document.getElementById('addBtn').textContent = '✓ Kemas Kini';
  document.getElementById('cancelEditBtn').classList.remove('hidden');
  editPanel.classList.remove('hidden');
  editPanel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function cancelEdit(){
  editingKey = null;
  document.getElementById('inDewan').value='';
  document.getElementById('inKelas').value='';
  document.getElementById('inCode').value='';
  document.getElementById('inSession').value='';
  document.getElementById('inStart').value='';
  document.getElementById('inEnd').value='';
  document.getElementById('formHeading').textContent = 'Tambah Sesi Peperiksaan';
  document.getElementById('addBtn').textContent = '+ Tambah';
  document.getElementById('cancelEditBtn').classList.add('hidden');
}

document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);

document.getElementById('resetAllBtn').addEventListener('click', ()=>{
  const hasSessions = Object.keys(sessions).length > 0;
  const isThresholdDefault = warnThreshold === 15;
  if(!hasSessions && isThresholdDefault) return;
  const ok = confirm('Reset semua sesi peperiksaan DAN amaran? Tindakan ini akan padam SEMUA kertas (semua kelas, semua dewan) dan kembalikan amaran ke nilai asal (15 minit).');
  if(ok){
    set(sessionsRef, null);
    cancelEdit();
    selectedClasses = [];
    selectedDewans = [];
    localStorage.setItem('examTimerSelectedClasses_v1', JSON.stringify(selectedClasses));
    localStorage.setItem('examTimerSelectedDewans_v1', JSON.stringify(selectedDewans));
    warnThreshold = 15;
    localStorage.setItem(THRESHOLD_KEY, warnThreshold);
    thresholdInput.value = warnThreshold;
  }
});

document.getElementById('addBtn').addEventListener('click', ()=>{
  const dewan = document.getElementById('inDewan').value.trim();
  const kelas = document.getElementById('inKelas').value.trim();
  const code = document.getElementById('inCode').value.trim();
  const session = document.getElementById('inSession').value.trim();
  const start = document.getElementById('inStart').value;
  const end = document.getElementById('inEnd').value;
  if(!code || !start || !end){
    alert('Sila isi Kod Kursus, Masa Mula dan Masa Tamat.');
    return;
  }
  const data = {dewan, kelas, code, session, start, end};
  if(editingKey !== null){
    update(ref(db, 'sessions/' + editingKey), data);
  } else {
    push(sessionsRef, data);
  }
  cancelEdit();
});

thresholdInput.addEventListener('change', ()=>{
  warnThreshold = parseInt(thresholdInput.value,10) || 15;
  localStorage.setItem(THRESHOLD_KEY, warnThreshold);
});

editToggleBtn.addEventListener('click', ()=>{
  editPanel.classList.toggle('hidden');
});

// (Seed data contoh dibuang — data sekarang dikongsi terus melalui Firebase
// merentasi semua peranti/dewan, jadi auto-seed tak sesuai lagi.)

document.getElementById('tabsToggleBtn').addEventListener('click', ()=>{
  tabsHidden = !tabsHidden;
  localStorage.setItem('examTimerTabsHidden_v1', tabsHidden);
  applyTabsVisibility();
});

render();
applyTabsVisibility();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
